<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<meta name="ext-resource-dependency" content="https://api.qrserver.com/v1/create-qr-code/?size=320x320&margin=0&color=24452f&bgcolor=faf5e9&data=https%3A%2F%2Fdocs.google.com%2Fforms%2Fd%2Fe%2F1FAIpQLSfs6xOEOdoIjI72mVckZQ9r6xNfqu9wGZy3WXAcMyzgKmGRZg%2Fviewform%3Fpli%3D1" data-resource-id="rsvpQr" />
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&amp;family=Jost:wght@300;400;500&amp;display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #0b1720; }
  html { scroll-behavior: smooth; }
  @keyframes ringPulse {
    0% { box-shadow: 0 0 0 0 rgba(233,215,180,0.55); }
    70% { box-shadow: 0 0 0 22px rgba(233,215,180,0); }
    100% { box-shadow: 0 0 0 0 rgba(233,215,180,0); }
  }
  @keyframes ringPulseInner {
    0%, 100% { transform: scale(1); opacity: 0.95; }
    50% { transform: scale(1.12); opacity: 1; }
  }
  @keyframes floatCue {
    0%, 100% { transform: translateY(0); opacity: 0.85; }
    50% { transform: translateY(8px); opacity: 0.5; }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes shimmer {
    0%, 100% { opacity: 0.35; }
    50% { opacity: 0.7; }
  }
  /* Video is portrait (9:16). On phones, fill the screen (cover).
     On landscape/desktop, show the whole vertical frame (contain),
     centered — the beach gradient fills the sides. */
  @media (min-aspect-ratio: 3/4) {
    .hero-video {
      object-fit: contain !important;
      object-position: 50% 50% !important;
    }
  }
</style>
</helmet>

<div style="font-family: 'Jost', sans-serif; color: #f4ede0; background: #0b1720;">

  <!-- ONE shared background video, fixed behind sections 1 & 2 -->
  <div style="position: fixed; inset: 0; z-index: 0;">
    <div style="position: absolute; inset: 0; background: linear-gradient(180deg, #7fa8b8 0%, #a8c4cb 34%, #cfd9d4 48%, #e6d7b8 58%, #d9c39a 78%, #c3a87f 100%);"></div>
    <video class="hero-video" ref="{{ heroVideoRef }}" src="videos/hero.mp4" muted="{{ true }}" autoPlay="{{ true }}" playsInline="{{ true }}" preload="auto" style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: 50% 100%; opacity: {{ heroVideoOpacity }}; transition: opacity 0.8s ease;"></video>
  </div>

  <!-- ============ SECTION 1 — HERO ============ -->
  <section id="hero" data-screen-label="Hero — ring moment" style="position: relative; z-index: 1; min-height: 100svh; overflow: hidden; display: flex; align-items: flex-end; justify-content: center;">
    <!-- cinematic vignette -->
    <div style="position: absolute; inset: 0; background: linear-gradient(180deg, rgba(6,14,20,0.42) 0%, rgba(6,14,20,0) 30%, rgba(6,14,20,0) 55%, rgba(6,14,20,0.55) 100%); pointer-events: none;"></div>

    <!-- top text -->
    <div style="position: absolute; top: 0; left: 0; right: 0; padding: max(6svh, 40px) 24px 0; display: flex; flex-direction: column; align-items: center; gap: 14px; text-align: center; animation: fadeUp 1.6s ease both;">
      <div style="font-size: 12px; letter-spacing: 0.42em; text-transform: uppercase; color: rgba(244,237,224,0.85); font-weight: 400;">{{ eyebrow }}</div>
      <h1 style="margin: 0; font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 500; font-size: clamp(40px, 11vw, 84px); line-height: 1.05; color: #faf5e9; text-shadow: 0 2px 24px rgba(6,14,20,0.35);">{{ names }}</h1>
      <div style="display: flex; align-items: center; gap: 14px; color: rgba(244,237,224,0.9);">
        <span style="display: block; width: 36px; height: 1px; background: rgba(244,237,224,0.5);"></span>
        <span style="font-size: 13px; letter-spacing: 0.34em; text-transform: uppercase;">Save the Date</span>
        <span style="display: block; width: 36px; height: 1px; background: rgba(244,237,224,0.5);"></span>
      </div>
    </div>

  </section>

  <!-- ============ SECTION 2 — COUNTDOWN ============ -->
  <section id="countdown" data-screen-label="Countdown" style="position: relative; z-index: 1; min-height: 100svh; overflow: hidden; display: flex; align-items: flex-end; justify-content: center;">
    <!-- video shows on top, fading into sand-cream below -->
    <div style="position: absolute; inset: 0; background: linear-gradient(180deg, rgba(234,226,211,0) 0%, rgba(234,226,211,0) 34%, rgba(234,226,211,0.85) 55%, #eae2d3 64%, #eae2d3 100%); pointer-events: none;"></div>

    <div style="position: relative; display: flex; flex-direction: column; align-items: center; gap: clamp(16px, 3svh, 30px); text-align: center; padding: 24px 24px max(12svh, 96px);">
      <div style="font-family: 'Cormorant Garamond', serif; font-size: clamp(24px, 6.4vw, 34px); letter-spacing: 0.18em; color: #6d4f33;">Countdown:</div>
      <div style="display: flex; gap: clamp(14px, 5vw, 40px); align-items: baseline;">
        <sc-for list="{{ countdownUnits }}" as="u" hint-placeholder-count="4">
          <div style="display: flex; flex-direction: column; align-items: center; gap: 8px; min-width: clamp(56px, 18vw, 110px);">
            <span style="font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: clamp(42px, 11vw, 88px); line-height: 1; color: #5d4227; font-variant-numeric: tabular-nums;">{{ u.value }}</span>
            <span style="font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase; color: rgba(109,79,51,0.75);">{{ u.label }}</span>
          </div>
        </sc-for>
      </div>
      <div style="font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: clamp(20px, 5.4vw, 30px); color: #6d4f33;">{{ prettyDate }}</div>
    </div>

    <!-- scroll cue -->
    <a href="#details" aria-label="Scroll to details" style="position: absolute; bottom: max(4svh, 26px); left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 8px; text-decoration: none; color: rgba(109,79,51,0.85);">
      <span style="font-size: 10px; letter-spacing: 0.34em; text-transform: uppercase;">The details</span>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="animation: floatCue 2.2s ease-in-out infinite;"><path d="M4 9l8 8 8-8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"></path></svg>
    </a>
  </section>

  <!-- ============ SECTION 3 — DETAILS ============ -->
  <section id="details" data-screen-label="Details" style="position: relative; z-index: 1; min-height: 100svh; overflow: hidden; display: flex; align-items: center; justify-content: center; background: linear-gradient(180deg, #1d3a2a 0%, #24452f 55%, #1a3526 100%);">
    <div style="position: absolute; inset: 0; background: radial-gradient(90% 45% at 50% 0%, rgba(233,215,180,0.10) 0%, rgba(233,215,180,0) 70%); pointer-events: none;"></div>

    <div style="position: relative; width: min(560px, 100%); padding: clamp(48px, 8svh, 80px) 28px; display: flex; flex-direction: column; align-items: center; gap: clamp(34px, 5svh, 52px); text-align: center;">
      <div style="display: flex; flex-direction: column; align-items: center; gap: 12px;">
        <div style="font-size: 11px; letter-spacing: 0.4em; text-transform: uppercase; color: rgba(233,215,180,0.85);">The Details</div>
      </div>

      <!-- location -->
      <div style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
        <div style="font-size: 10px; letter-spacing: 0.34em; text-transform: uppercase; color: rgba(244,237,224,0.6);">Where</div>
        <div style="font-family: 'Cormorant Garamond', serif; font-size: clamp(24px, 6vw, 32px); font-weight: 500; color: #f4ede0; line-height: 1.25;">{{ venueName }}</div>
        <div style="font-size: 14px; font-weight: 300; letter-spacing: 0.04em; color: rgba(244,237,224,0.75); line-height: 1.6; max-width: 40ch;">{{ venueAddress }}</div>
        <a href="{{ mapUrl }}" target="_blank" rel="noopener" style="margin-top: 6px; display: inline-flex; align-items: center; gap: 8px; padding: 12px 26px; min-height: 44px; box-sizing: border-box; border: 1px solid rgba(233,215,180,0.55); border-radius: 999px; color: #ecdfc2; text-decoration: none; font-size: 12px; letter-spacing: 0.26em; text-transform: uppercase;" style-hover="background: rgba(233,215,180,0.12);">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 21s7-5.1 7-11a7 7 0 1 0-14 0c0 5.9 7 11 7 11z" stroke="currentColor" stroke-width="1.4"></path><circle cx="12" cy="10" r="2.6" stroke="currentColor" stroke-width="1.4"></circle></svg>
          Open in Maps
        </a>
      </div>

      <span style="display: block; width: 52px; height: 1px; background: rgba(233,215,180,0.35);"></span>

      <!-- dress code -->
      <div style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
        <div style="font-size: 10px; letter-spacing: 0.34em; text-transform: uppercase; color: rgba(244,237,224,0.6);">Dress code</div>
        <div style="font-family: 'Cormorant Garamond', serif; font-size: clamp(22px, 5.6vw, 28px); font-weight: 500; color: #f4ede0;">{{ dressCode }}</div>
        <div style="font-size: 14px; font-weight: 300; color: rgba(244,237,224,0.7); line-height: 1.6; max-width: 42ch;">{{ dressCodeNote }}</div>
      </div>

      <span style="display: block; width: 52px; height: 1px; background: rgba(233,215,180,0.35);"></span>

      <!-- RSVP -->
      <div style="display: flex; flex-direction: column; align-items: center; gap: 16px;">
        <div style="font-size: 10px; letter-spacing: 0.34em; text-transform: uppercase; color: rgba(244,237,224,0.6);">RSVP</div>
        <div style="background: #faf5e9; padding: 14px; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.35); width: 160px; height: 160px;">
          <img ref="{{ qrRef }}" alt="RSVP QR code" width="160" height="160" style="display: block; width: 160px; height: 160px;">
        </div>
        <a href="{{ rsvpUrl }}" target="_blank" rel="noopener" style="display: inline-flex; align-items: center; padding: 12px 26px; min-height: 44px; box-sizing: border-box; border-radius: 999px; background: rgba(233,215,180,0.92); color: #24452f; text-decoration: none; font-size: 12px; letter-spacing: 0.26em; text-transform: uppercase; font-weight: 500;" style-hover="background: #f2e4c4;">Or tap to RSVP</a>
        <div style="font-size: 12px; font-weight: 300; color: rgba(244,237,224,0.55); letter-spacing: 0.08em;">Kindly respond by {{ rsvpBy }}</div>
      </div>

      <div style="margin-top: 8px; font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 18px; color: rgba(233,215,180,0.8);">With love, {{ names }}</div>
    </div>
  </section>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;names&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Lorelei Grover &amp; William Dang&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Couple&quot;},
  &quot;weddingDate&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;2027-07-11T17:00:00&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Couple&quot;},
  &quot;ringPauseTime&quot;: {&quot;editor&quot;: &quot;float&quot;, &quot;default&quot;: 4, &quot;min&quot;: 0, &quot;max&quot;: 120, &quot;step&quot;: 0.1, &quot;unit&quot;: &quot;s&quot;, &quot;section&quot;: &quot;Hero video&quot;},
  &quot;hotspotX&quot;: {&quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 36, &quot;min&quot;: 0, &quot;max&quot;: 100, &quot;step&quot;: 1, &quot;unit&quot;: &quot;% of frame&quot;, &quot;section&quot;: &quot;Hero video&quot;},
  &quot;hotspotY&quot;: {&quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 86, &quot;min&quot;: 0, &quot;max&quot;: 100, &quot;step&quot;: 1, &quot;unit&quot;: &quot;% of frame&quot;, &quot;section&quot;: &quot;Hero video&quot;},
  &quot;runStartTime&quot;: {&quot;editor&quot;: &quot;float&quot;, &quot;default&quot;: 0, &quot;min&quot;: 0, &quot;max&quot;: 120, &quot;step&quot;: 0.1, &quot;unit&quot;: &quot;s&quot;, &quot;section&quot;: &quot;Countdown video&quot;},
  &quot;runEndTime&quot;: {&quot;editor&quot;: &quot;float&quot;, &quot;default&quot;: 14, &quot;min&quot;: 0, &quot;max&quot;: 120, &quot;step&quot;: 0.1, &quot;unit&quot;: &quot;s&quot;, &quot;section&quot;: &quot;Countdown video&quot;},
  &quot;venueName&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Jeremiah’s Garden&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Details&quot;},
  &quot;venueAddress&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;1329 W 12th St, Ogden, UT 84404, United States&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Details&quot;},
  &quot;mapUrl&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;https://maps.app.goo.gl/FrvDBEworZE5C5hL6&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Details&quot;},
  &quot;dressCode&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Green &amp; Brown&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Details&quot;},
  &quot;rsvpUrl&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;https://docs.google.com/forms/d/e/1FAIpQLSfs6xOEOdoIjI72mVckZQ9r6xNfqu9wGZy3WXAcMyzgKmGRZg/viewform?pli=1&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Details&quot;},
  &quot;rsvpBy&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;June 1, 2027&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Details&quot;}
}">
class Component extends DCLogic {
  state = { now: Date.now(), heroReady: false, countdownReady: false, heroZoomed: false };

  componentDidMount() {
    this.timer = setInterval(() => this.setState({ now: Date.now() }), 1000);
    this.recalcHotspot = () => {
      const vw = this.videoW || 1728, vh = this.videoH || 3072;
      const w = window.innerWidth, h = window.innerHeight;
      if (!w || !h) return;
      // mirror object-fit: cover; object-position: 50% 100%
      const s = Math.max(w / vw, h / vh);
      const dw = vw * s, dh = vh * s;
      const ox = (w - dw) / 2, oy = h - dh;
      const fx = (this.props.hotspotX ?? 36) / 100, fy = (this.props.hotspotY ?? 86) / 100;
      const left = (ox + fx * dw) / w * 100;
      const top = (oy + fy * dh) / h * 100;
      if (Math.abs((this.state.hsLeft ?? 0) - left) > 0.1 || Math.abs((this.state.hsTop ?? 0) - top) > 0.1) {
        this.setState({ hsLeft: left, hsTop: top });
      }
    };
    window.addEventListener('resize', this.recalcHotspot);
    this.recalcHotspot();
  }
  componentDidUpdate() { if (this.recalcHotspot) this.recalcHotspot(); }
  componentWillUnmount() {
    clearInterval(this.timer);
    window.removeEventListener('resize', this.recalcHotspot);
  }

  renderVals() {
    const p = this.props;
    const names = p.names ?? 'Lorelei Grover & William Dang';
    const weddingDate = p.weddingDate ?? '2027-07-11T17:00:00';
    const rsvpUrl = p.rsvpUrl ?? 'https://docs.google.com/forms/d/e/1FAIpQLSfs6xOEOdoIjI72mVckZQ9r6xNfqu9wGZy3WXAcMyzgKmGRZg/viewform?pli=1';
    const target = new Date(weddingDate).getTime();
    let diff = Math.max(0, target - this.state.now);
    const d = Math.floor(diff / 86400000);
    const h = Math.floor(diff / 3600000) % 24;
    const m = Math.floor(diff / 60000) % 60;
    const s = Math.floor(diff / 1000) % 60;
    const pad = (n) => String(n).padStart(2, '0');

    const prettyDate = new Date(weddingDate).toLocaleDateString('en-US', {
      weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
    });


    return {
      names,
      eyebrow: p.eyebrow ?? 'We\u2019re getting married',
      prettyDate,
      countdownUnits: [
        { value: String(d), label: 'Days' },
        { value: pad(h), label: 'Hours' },
        { value: pad(m), label: 'Minutes' },
        { value: pad(s), label: 'Seconds' },
      ],
      hotspotLeft: (this.state.hsLeft ?? 36) + '%',
      hotspotTop: (this.state.hsTop ?? 86) + '%',
      hotspotLabel: p.hotspotLabel ?? 'Tap the ring',
      venueName: p.venueName ?? 'Jeremiah\u2019s Garden',
      venueAddress: p.venueAddress ?? '1329 W 12th St, Ogden, UT 84404, United States',
      mapUrl: p.mapUrl ?? 'https://maps.app.goo.gl/FrvDBEworZE5C5hL6',
      dressCode: p.dressCode ?? 'Green & Brown',
      dressCodeNote: p.dressCodeNote ?? 'Dress in shades of green and brown to match our garden celebration.',
      rsvpUrl,
      rsvpBy: p.rsvpBy ?? 'June 1, 2027',
      qrRef: (el) => {
        if (!el) return;
        const baked = (window.__resources && window.__resources.rsvpQr && rsvpUrl === 'https://docs.google.com/forms/d/e/1FAIpQLSfs6xOEOdoIjI72mVckZQ9r6xNfqu9wGZy3WXAcMyzgKmGRZg/viewform?pli=1') ? window.__resources.rsvpQr : null;
        const url = baked || ('https://api.qrserver.com/v1/create-qr-code/?size=320x320&margin=0&color=24452f&bgcolor=faf5e9&data=' + encodeURIComponent(rsvpUrl));
        if (el.src !== url) el.src = url;
      },

      heroVideoRef: (el) => {
        if (el && el !== this.heroVideo) {
          this.heroVideo = el;
          this.phase = 'intro'; // intro: play 0 -> ring moment, hold; run: runStart -> end, loop
          const pauseA = () => this.props.ringPauseTime ?? 4;
          const runStart = () => this.props.runStartTime ?? 0;
          // React doesn't reliably set muted on the DOM node; without it autoplay is blocked
          el.muted = true;
          el.defaultMuted = true;
          el.setAttribute('muted', '');
          el.setAttribute('playsinline', '');
          const kick = () => {
            this.videoW = el.videoWidth || this.videoW;
            this.videoH = el.videoHeight || this.videoH;
            if (this.recalcHotspot) this.recalcHotspot();
            this.setState({ heroReady: true });
            // make sure the intro actually plays from the start
            if (this.phase === 'intro' && el.paused && el.currentTime < pauseA()) {
              el.play().catch(() => {});
            }
          };
          if (el.readyState >= 2) kick();
          else el.addEventListener('loadeddata', kick);
          // if autoplay was blocked, start on first touch
          const unlock = () => {
            if (this.phase === 'intro' && el.paused && el.currentTime < pauseA()) el.play().catch(() => {});
            document.removeEventListener('pointerdown', unlock);
          };
          document.addEventListener('pointerdown', unlock);
          const runEnd = () => this.props.runEndTime ?? 14;
          el.addEventListener('timeupdate', () => {
            if (this.phase === 'intro' && el.currentTime >= pauseA()) el.pause();
            else if (this.phase === 'run' && el.currentTime >= runEnd()) { el.currentTime = runStart(); el.play(); }
          });
          el.addEventListener('ended', () => {
            if (this.phase === 'run') { el.currentTime = runStart(); el.play(); }
          });
          this.startRun = () => {
            this.phase = 'run';
            el.currentTime = runStart();
            el.play();
          };
          // drive the single video from scroll position
          const countdownSec = document.getElementById('countdown');
          if (this.sectionObserver) this.sectionObserver.disconnect();
          this.sectionObserver = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                this.startRun();
              } else if (entry.boundingClientRect.top > 0) {
                // scrolled back up to the hero: hold on the ring frame
                this.phase = 'intro';
                el.pause();
                el.currentTime = pauseA();
              }
            });
          }, { threshold: 0.35 });
          if (countdownSec) this.sectionObserver.observe(countdownSec);
        }
      },

      heroVideoOpacity: this.state.heroReady ? 1 : 0,
      goToCountdown: () => {
        const el = document.getElementById('countdown');
        if (this.startRun) this.startRun();
        if (el) window.scrollTo({ top: el.offsetTop, behavior: 'smooth' });
      },
    };
  }
}
</script>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#14293a"/><circle cx="50" cy="53" r="14" fill="none" stroke="#d9b98a" stroke-width="4"/><path d="M50 30 L56 36 L50 42 L44 36 Z" fill="#eef6fa"/></svg>
</template>
<template id="__bundler_thumbnail" data-bg-color="#24452f">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#24452f"/><circle cx="50" cy="53" r="14" fill="none" stroke="#d9b98a" stroke-width="4"/><path d="M50 30 L56 36 L50 42 L44 36 Z" fill="#eef6fa"/></svg>
</template>
